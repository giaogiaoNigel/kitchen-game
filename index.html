<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>像素厨房（网页小游戏原型）</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header class="hud">
      <div class="left">
        <div><b>订单</b>：<span id="orderText">-</span></div>
        <div><b>手上</b>：<span id="handText">空</span></div>
      </div>
      <div class="right">
        <div><b>分数</b>：<span id="scoreText">0</span></div>
        <div><b>时间</b>：<span id="timeText">120</span>s</div>
      </div>
    </header>

    <canvas id="c" width="640" height="360"></canvas>

    <footer class="tips">
      移动：WASD/方向键　交互：E　丢弃：Q　冲刺：Shift（消耗少量时间）
    </footer>
  </div>

  <script src="game.js"></script>
</body>
</html>
